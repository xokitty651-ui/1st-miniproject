<!-- SVG Farming Illustrations -->

<!-- Corn/Wheat Plant -->
<svg id="corn-plant" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 150" width="80" height="120" style="display: none;">
    <defs>
        <linearGradient id="stalkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#2D7A3D;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#3FA854;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- Stalk -->
    <path d="M 50 150 Q 48 120 50 90 Q 52 60 50 30" stroke="url(#stalkGradient)" stroke-width="6" fill="none" stroke-linecap="round"/>
    <!-- Leaves -->
    <path d="M 50 120 Q 35 115 30 100" stroke="#3FA854" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 50 100 Q 65 95 70 80" stroke="#3FA854" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 50 80 Q 35 75 28 60" stroke="#2D7A3D" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M 50 60 Q 68 58 75 45" stroke="#2D7A3D" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Corn ear -->
    <ellipse cx="70" cy="70" rx="8" ry="12" fill="#F4A460" opacity="0.7"/>
    <!-- Tassel -->
    <line x1="50" y1="30" x2="50" y2="15" stroke="#C8E6C9" stroke-width="3" opacity="0.8"/>
    <line x1="45" y1="20" x2="50" y2="15" stroke="#C8E6C9" stroke-width="2" opacity="0.8"/>
    <line x1="55" y1="20" x2="50" y2="15" stroke="#C8E6C9" stroke-width="2" opacity="0.8"/>
</svg>

<!-- Tomato Plant -->
<svg id="tomato-plant" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="70" height="110" style="display: none;">
    <defs>
        <radialGradient id="tomatoGradient">
            <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#C1121F;stop-opacity:1" />
        </radialGradient>
    </defs>
    <!-- Stem -->
    <path d="M 50 140 Q 48 100 50 60" stroke="#2D7A3D" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Leaves -->
    <g opacity="0.85">
        <path d="M 50 110 L 35 100 L 38 115 Z" fill="#3FA854"/>
        <path d="M 50 110 L 65 100 L 62 115 Z" fill="#3FA854"/>
        <path d="M 50 85 L 32 75 L 36 90 Z" fill="#2D7A3D"/>
        <path d="M 50 85 L 68 75 L 64 90 Z" fill="#2D7A3D"/>
    </g>
    <!-- Tomatoes -->
    <circle cx="35" cy="70" r="12" fill="url(#tomatoGradient)"/>
    <circle cx="65" cy="65" r="13" fill="url(#tomatoGradient)"/>
    <circle cx="50" cy="45" r="11" fill="#FF8787"/>
</svg>

<!-- Carrot -->
<svg id="carrot" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 120" width="60" height="90" style="display: none;">
    <!-- Carrot Root -->
    <path d="M 40 30 L 35 120 L 45 120 Z" fill="#FF9F1C"/>
    <!-- Green Tops -->
    <path d="M 40 30 Q 25 10 20 5" stroke="#3FA854" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 40 30 Q 55 10 60 5" stroke="#3FA854" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M 40 30 Q 40 8 38 2" stroke="#2D7A3D" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Leaves -->
    <ellipse cx="25" cy="15" rx="3" ry="8" fill="#3FA854" opacity="0.8"/>
    <ellipse cx="55" cy="12" rx="3" ry="8" fill="#3FA854" opacity="0.8"/>
</svg>

<!-- Wheat/Grain -->
<svg id="wheat" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 100" width="50" height="80" style="display: none;">
    <defs>
        <linearGradient id="wheatGradient" x1="0%" y1="100%" x2="0%" y2="0%">
            <stop offset="0%" style="stop-color:#D4A574;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#F4D35E;stop-opacity:1" />
        </linearGradient>
    </defs>
    <!-- Stem -->
    <line x1="30" y1="100" x2="30" y2="30" stroke="#8B7355" stroke-width="2"/>
    <!-- Head -->
    <g fill="url(#wheatGradient)">
        <polygon points="30,30 25,10 28,25 22,8 26,20 20,5 25,15 22,10" stroke="#D4A574" stroke-width="0.5"/>
        <polygon points="35,30 35,10 35,20 38,8 37,20 42,5 37,15 39,10" stroke="#D4A574" stroke-width="0.5"/>
        <polygon points="28,28 28,10 32,20 32,8 31,20 35,5 30,15 32,12" stroke="#D4A574" stroke-width="0.5"/>
    </g>
</svg>

<!-- Apple Tree -->
<svg id="apple-tree" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 130" width="80" height="100" style="display: none;">
    <!-- Trunk -->
    <rect x="42" y="80" width="16" height="50" fill="#5D4037" rx="4"/>
    <!-- Crown -->
    <circle cx="50" cy="60" r="35" fill="#2D7A3D" opacity="0.9"/>
    <circle cx="30" cy="50" r="25" fill="#3FA854" opacity="0.85"/>
    <circle cx="70" cy="50" r="25" fill="#3FA854" opacity="0.85"/>
    <!-- Apples -->
    <circle cx="35" cy="45" r="6" fill="#C1121F"/>
    <circle cx="65" cy="40" r="6" fill="#FF6B6B"/>
    <circle cx="50" cy="35" r="6" fill="#E63946"/>
</svg>

<!-- Tractor (simplified) -->
<svg id="tractor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80" width="100" height="65" style="display: none;">
    <!-- Body -->
    <rect x="30" y="35" width="50" height="25" fill="#C1121F" rx="3"/>
    <!-- Cabin -->
    <rect x="70" y="30" width="15" height="20" fill="#FF6B6B" rx="2"/>
    <rect x="72" y="32" width="5" height="5" fill="#87CEEB" opacity="0.7"/>
    <!-- Front Wheel (large) -->
    <circle cx="75" cy="65" r="15" fill="#333" stroke="#666" stroke-width="2"/>
    <circle cx="75" cy="65" r="10" fill="none" stroke="#888" stroke-width="1"/>
    <!-- Back Wheel (small) -->
    <circle cx="35" cy="65" r="8" fill="#333" stroke="#666" stroke-width="1.5"/>
    <circle cx="35" cy="65" r="5" fill="none" stroke="#888" stroke-width="0.8"/>
    <!-- Plow/Implement -->
    <line x1="30" y1="50" x2="10" y2="65" stroke="#8B7355" stroke-width="3" stroke-linecap="round"/>
</svg>

<!-- Sunflower -->
<svg id="sunflower" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="70" height="100" style="display: none;">
    <!-- Stem -->
    <path d="M 50 140 Q 48 100 50 60" stroke="#2D7A3D" stroke-width="4" fill="none" stroke-linecap="round"/>
    <!-- Petals (yellow) -->
    <g fill="#F4D35E" opacity="0.9">
        <ellipse cx="50" cy="20" rx="8" ry="15"/>
        <ellipse cx="70" cy="35" rx="8" ry="15" transform="rotate(60 70 35)"/>
        <ellipse cx="70" cy="55" rx="8" ry="15" transform="rotate(120 70 55)"/>
        <ellipse cx="50" cy="70" rx="8" ry="15" transform="rotate(180 50 70)"/>
        <ellipse cx="30" cy="55" rx="8" ry="15" transform="rotate(240 30 55)"/>
        <ellipse cx="30" cy="35" rx="8" ry="15" transform="rotate(300 30 35)"/>
    </g>
    <!-- Center (seed head) -->
    <circle cx="50" cy="45" r="12" fill="#F9A825"/>
    <circle cx="50" cy="45" r="10" fill="#FF9F1C" opacity="0.8"/>
    <!-- Leaves -->
    <path d="M 50 100 Q 35 95 30 110" stroke="#3FA854" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
    <path d="M 50 100 Q 65 95 70 110" stroke="#3FA854" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>
</svg>

<!-- Watering Can Icon -->
<svg id="watering-can" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="60" height="60" style="display: none;">
    <!-- Can body -->
    <ellipse cx="40" cy="70" rx="25" ry="15" fill="#C1121F"/>
    <path d="M 15 70 L 10 50 Q 10 40 20 40 L 60 40 Q 70 40 70 50 L 65 70" stroke="#C1121F" stroke-width="2" fill="none"/>
    <!-- Handle -->
    <path d="M 20 50 Q 10 35 20 25" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Spout -->
    <path d="M 70 60 L 85 55" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Water drops from spout -->
    <circle cx="85" cy="70" r="2" fill="#87CEEB" opacity="0.8"/>
    <circle cx="88" cy="75" r="2" fill="#87CEEB" opacity="0.6"/>
</svg>
