<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AgriMarket</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body
    class="bg-gradient-to-br from-primary-green via-light-green to-secondary-green min-h-screen flex items-center justify-center">
    <!-- Background Animation -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div
            class="absolute -top-20 -left-20 w-60 h-60 bg-accent-orange opacity-10 rounded-full blur-3xl animate-pulse">
        </div>
        <div
            class="absolute -bottom-20 -right-20 w-60 h-60 bg-accent-orange opacity-10 rounded-full blur-3xl animate-pulse">
        </div>
    </div>

    <div class="container mx-auto px-4 relative z-10">
        <div class="max-w-md mx-auto">
            <!-- Card -->
            <div
                class="bg-white backdrop-filter backdrop-blur-lg bg-opacity-95 rounded-2xl shadow-2xl p-8 border border-white border-opacity-20">
                <!-- Logo -->
                <div class="text-center mb-8">
                    <div class="flex items-center justify-center space-x-2 mb-4">
                        <i class='bx bxs-leaf text-primary-green text-3xl'></i>
                        <span class="text-2xl font-bold text-primary-green">AgriMarket</span>
                    </div>
                    <h1 class="text-3xl font-bold text-neutral-dark mb-2">Welcome Back</h1>
                    <p class="text-gray-600">Log in to access your account</p>
                </div>

                <!-- Form -->
                <form id="login-form" class="space-y-6">
                    <!-- Email Input -->
                    <div class="relative">
                        <input type="email" placeholder="Email Address" required
                            class="w-full px-6 py-3 border-2 border-gray-300 rounded-lg bg-white text-neutral-dark placeholder-gray-400 focus:border-primary-green focus:outline-none transition"
                            id="email">
                        <i class='bx bx-mail-send absolute right-3 top-3.5 text-gray-400 text-xl'></i>
                    </div>

                    <!-- Password Input -->
                    <div class="relative">
                        <input type="password" placeholder="Password" required
                            class="w-full px-6 py-3 border-2 border-gray-300 rounded-lg bg-white text-neutral-dark placeholder-gray-400 focus:border-primary-green focus:outline-none transition"
                            id="password">
                        <i
                            class='bx bx-lock absolute right-3 top-3.5 text-gray-400 text-xl cursor-pointer toggle-password'></i>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2 text-sm text-gray-600">
                            <input type="checkbox" class="w-4 h-4 rounded text-primary-green focus:ring-primary-green">
                            <span>Remember Me</span>
                        </label>
                        <a href="forgot-password.html"
                            class="text-sm text-primary-green hover:text-secondary-green transition font-semibold">Forgot
                            Password?</a>
                    </div>

                    <!-- Login Button -->
                    <button type="submit"
                        class="w-full bg-gradient-to-r from-primary-green to-secondary-green text-white py-3 rounded-lg font-bold text-lg hover:shadow-lg transition transform hover:scale-105">
                        <span class="flex items-center justify-center space-x-2">
                            <span>LOGIN</span>
                            <i class='bx bx-right-arrow-alt'></i>
                        </span>
                    </button>
                </form>

                <!-- Divider -->
                <div class="my-6 flex items-center">
                    <div class="flex-1 border-t border-gray-300"></div>
                    <div class="px-4 text-gray-500 text-sm">OR CONTINUE WITH</div>
                    <div class="flex-1 border-t border-gray-300"></div>
                </div>

                <!-- Social Login -->
                <div class="grid grid-cols-3 gap-4">
                    <button type="button"
                        class="flex items-center justify-center py-3 border-2 border-gray-300 rounded-lg hover:border-primary-green hover:bg-light-green transition"
                        title="Login with Google" aria-label="Sign in with Google">
                        <i class='bx bxl-google text-2xl text-red-500'></i>
                    </button>
                    <button type="button"
                        class="flex items-center justify-center py-3 border-2 border-gray-300 rounded-lg hover:border-primary-green hover:bg-light-green transition"
                        title="Login with Facebook" aria-label="Sign in with Facebook">
                        <i class='bx bxl-facebook text-2xl text-blue-600'></i>
                    </button>
                    <button type="button"
                        class="flex items-center justify-center py-3 border-2 border-gray-300 rounded-lg hover:border-primary-green hover:bg-light-green transition"
                        title="Login with GitHub" aria-label="Sign in with GitHub">
                        <i class='bx bxl-github text-2xl text-neutral-dark'></i>
                    </button>
                </div>

                <!-- Sign Up Link -->
                <div class="mt-8 text-center">
                    <p class="text-gray-600">Don't have an account?
                        <a href="register.html"
                            class="text-primary-green hover:text-secondary-green transition font-bold">Sign Up</a>
                    </p>
                </div>

                <!-- Info Box -->
                <div class="mt-8 p-4 bg-light-green rounded-lg border-l-4 border-primary-green">
                    <p class="text-sm text-gray-700">
                        <span class="font-semibold text-primary-green">Demo Credentials:</span><br>
                        Email: demo@agrimarket.com<br>
                        Password: Demo@123
                    </p>
                </div>
            </div>

            <!-- Link Back to Home -->
            <div class="text-center mt-8">
                <a href="../pages/index.html"
                    class="text-white hover:text-accent-orange transition font-semibold flex items-center justify-center space-x-2">
                    <i class='bx bx-left-arrow-alt'></i>
                    <span>Back to Home</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-4 right-4 space-y-2"></div>

    <script src="../js/auth.js"></script>
    <script>
        // Toggle Password Visibility
        document.querySelector('.toggle-password').addEventListener('click', function () {
            const passwordInput = document.getElementById('password');
            const icon = this;

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('bx-lock');
                icon.classList.add('bx-lock-open');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('bx-lock-open');
                icon.classList.add('bx-lock');
            }
        });

        // Handle Form Submission
        document.getElementById('login-form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // TODO: Replace with actual API call
                console.log('Login attempt:', { email, password });

                // Simulate successful login
                showToast('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);
            } catch (error) {
                showToast('Login failed. Please try again.', 'error');
            }
        });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const bgColor = type === 'success' ? 'bg-success-green' : type === 'error' ? 'bg-error-red' : 'bg-primary-green';

            toast.className = `${bgColor} text-white px-6 py-4 rounded-lg shadow-lg flex items-center space-x-2 animate-bounce`;
            toast.innerHTML = `
                <i class='bx ${type === 'success' ? 'bx-check-circle' : type === 'error' ? 'bx-x-circle' : 'bx-info-circle'}'></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>

</html>
